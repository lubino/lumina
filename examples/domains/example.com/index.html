<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>example.com — Lumina</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <main>
      <h1>example.com</h1>
      <p>Served by <strong>Lumina</strong> multi-domain server.</p>
      <ul>
        <li><a href="./assets/style.css">Static asset</a></li>
        <li><a href="./health">Endpoint <code>/health</code></a></li>
        <li><a href="./api">Endpoint <code>/api</code></a></li>
        <li><a href="./hello/world">Endpoint <code>/hello/:name</code></a></li>
        <li><a href="./users/42/profile">Endpoint <code>/users/:id/profile</code></a></li>
        <li><a href="./docs/guide/install">Endpoint <code>/docs/*</code></a></li>
        <li><a href="./time">Endpoint <code>/time</code></a></li>
        <li><a href="./echo?x=1">Endpoint <code>/echo</code></a></li>
        <li><a href="./methods">Endpoint <code>/methods</code></a></li>
      </ul>
    </main>
  </body>
</html>
