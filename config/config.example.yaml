# Example operator configuration for Lumina.
# Copy and point LUMINA_CONFIG at your file.

paths:
  domains_dir: /data/domains
  git_cache_dir: /data/git-cache

domains:
  example.com:
    root: example.com
    aliases:
      - www.example.com
    git:
      enabled: false

